<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPL Düzey 3 - Sınav Hazırlık</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app {
            max-width: 480px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            height: 780px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        /* HEADER */
        .header {
            padding: 16px 20px 12px 20px;
            background: #ffffff;
            border-bottom: 1px solid #efefef;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .header .back-btn {
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
            color: #003399;
            display: none;
            padding: 4px 8px;
        }
        .header .back-btn.visible {
            display: block;
        }
        .header .title {
            font-size: 18px;
            font-weight: 700;
            color: #1c1c1e;
            flex: 1;
        }
        .header .title span {
            font-weight: 400;
            font-size: 14px;
            color: #8e8e93;
        }
        .header .progress {
            font-size: 13px;
            font-weight: 600;
            color: #003399;
            background: #f0f4ff;
            padding: 4px 14px;
            border-radius: 20px;
        }
        /* İÇERİK ALANI */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px 20px 20px;
            background: #fafafa;
        }
        /* MODÜL KARTLARI */
        .module-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .module-card {
            background: white;
            border-radius: 16px;
            padding: 18px 14px;
            border: 1px solid #e9ecf2;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .module-card:hover {
            transform: translateY(-2px);
            border-color: #003399;
        }
        .module-card .icon {
            font-size: 32px;
            display: block;
            margin-bottom: 6px;
        }
        .module-card .name {
            font-size: 13px;
            font-weight: 600;
            color: #1c1c1e;
            line-height: 1.3;
        }
        /* KONU LİSTESİ */
        .topic-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .topic-item {
            background: white;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #e9ecf2;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topic-item:hover {
            border-color: #003399;
            background: #f8faff;
        }
        .topic-item .topic-name {
            font-size: 15px;
            font-weight: 500;
            color: #1c1c1e;
        }
        .topic-item .topic-count {
            font-size: 13px;
            color: #8e8e93;
            background: #f0f2f5;
            padding: 2px 12px;
            border-radius: 30px;
        }
        /* SORU EKRANI */
        .question-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #e9ecf2;
        }
        .question-badge {
            display: inline-block;
            background: #003399;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 14px;
            border-radius: 20px;
            margin-bottom: 12px;
        }
        .question-text {
            font-size: 17px;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 16px;
            color: #1c1c1e;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }
        .option-item {
            background: #f8f9fc;
            border-radius: 12px;
            padding: 12px 14px;
            border: 2px solid #e9ecf2;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.15s;
        }
        .option-item:hover {
            background: #f0f4ff;
            border-color: #b3c6e7;
        }
        .option-item .letter {
            font-weight: 700;
            color: #003399;
            background: #e6edf9;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .option-item.correct-selected {
            border-color: #00b894;
            background: #e6f9f1;
        }
        .option-item.correct-selected .letter {
            background: #00b894;
            color: white;
        }
        .option-item.wrong-selected {
            border-color: #ff3b30;
            background: #ffe8e7;
        }
        .option-item.wrong-selected .letter {
            background: #ff3b30;
            color: white;
        }
        .option-item.show-correct {
            border-color: #00b894;
            background: #e6f9f1;
        }
        .option-item.show-correct .letter {
            background: #00b894;
            color: white;
        }
        .option-item.disabled {
            pointer-events: none;
            opacity: 0.8;
        }
        .result-area {
            display: none;
            margin: 12px 0 16px 0;
            padding: 16px;
            border-radius: 14px;
            background: #f8f9fc;
            border-left: 5px solid #003399;
        }
        .result-area.visible {
            display: block;
        }
        .result-area .result-badge {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 4px;
        }
        .result-area .result-badge.correct-text {
            color: #00b894;
        }
        .result-area .result-badge.wrong-text {
            color: #ff3b30;
        }
        .result-area .explanation {
            font-size: 15px;
            line-height: 1.5;
            color: #2c2c2e;
            margin-top: 6px;
        }
        /* NAV BUTONLARI */
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .nav-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.15s;
        }
        .nav-buttons .prev-btn {
            background: #f0f2f5;
            color: #1c1c1e;
        }
        .nav-buttons .prev-btn:hover {
            background: #e5e7eb;
        }
        .nav-buttons .next-btn {
            background: #003399;
            color: white;
        }
        .nav-buttons .next-btn:hover {
            background: #002277;
        }
        .nav-buttons button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        /* DETAY BUTONU */
        .btn-detail {
            width: 100%;
            background: #003399;
            color: white;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 4px;
        }
        .btn-detail:hover {
            background: #002277;
        }
        /* GİZLİ EKRANLAR */
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }
    </style>
</head>
<body>

<div class="app">

    <!-- HEADER -->
    <div class="header">
        <button class="back-btn" id="backBtn">‹</button>
        <div class="title" id="headerTitle">SPL Düzey 3 <span>• Sınav Hazırlık</span></div>
        <div class="progress" id="headerProgress">12 Modül</div>
    </div>

    <!-- İÇERİK -->
    <div class="content" id="contentArea">

        <!-- EKRAN 1: MODÜL LİSTESİ -->
        <div class="screen active" id="screenModules">
            <div class="module-grid" id="moduleGrid"></div>
        </div>

        <!-- EKRAN 2: KONU LİSTESİ -->
        <div class="screen" id="screenTopics">
            <div class="topic-list" id="topicList"></div>
        </div>

        <!-- EKRAN 3: SORU EKRANI -->
        <div class="screen" id="screenQuestions">
            <div class="question-card">
                <div class="question-badge" id="qBadge">📘 Konu</div>
                <div class="question-text" id="qText">Soru yükleniyor...</div>
                <div class="options" id="optionsContainer"></div>
                <div class="result-area" id="resultArea">
                    <div class="result-badge" id="resultBadge"></div>
                    <div class="explanation" id="resultExplanation"></div>
                </div>
                <div class="nav-buttons">
                    <button class="prev-btn" id="prevQuestion">‹ Önceki</button>
                    <button class="next-btn" id="nextQuestion">Sonraki ›</button>
                </div>
                <button class="btn-detail" id="detailBtn">📖 Modüle Dön</button>
            </div>
        </div>

    </div>
</div>

<script>
    // -----------------------------------------------------------
    //  VERİYİ YÜKLE
    // -----------------------------------------------------------
    let data = null;
    let currentModule = null;
    let currentTopic = null;
    let currentQuestionIndex = 0;
    let isAnswered = false;

    fetch('data.json')
        .then(res => res.json())
        .then(d => {
            data = d;
            renderModules();
        })
        .catch(err => {
            document.getElementById('moduleGrid').innerHTML =
                '<p style="color:red;text-align:center;">❌ data.json yüklenemedi! GitHub\'a yüklediğinizden emin olun.</p>';
            console.error(err);
        });

    // -----------------------------------------------------------
    //  EKRAN YÖNETİMİ
    // -----------------------------------------------------------
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // -----------------------------------------------------------
    //  1. MODÜL LİSTESİ
    // -----------------------------------------------------------
    function renderModules() {
        const grid = document.getElementById('moduleGrid');
        grid.innerHTML = '';
        data.moduller.forEach(mod => {
            const card = document.createElement('div');
            card.className = 'module-card';
            card.innerHTML = `
                <span class="icon">${mod.ikon}</span>
                <div class="name">${mod.baslik}</div>
            `;
            card.onclick = () => openModule(mod.id);
            grid.appendChild(card);
        });
        document.getElementById('headerTitle').innerHTML = 'SPL Düzey 3 <span>• Sınav Hazırlık</span>';
        document.getElementById('headerProgress').textContent = `${data.moduller.length} Modül`;
        document.getElementById('backBtn').classList.remove('visible');
        showScreen('screenModules');
    }

    // -----------------------------------------------------------
    //  2. MODÜL AÇ → KONU LİSTESİ
    // -----------------------------------------------------------
    function openModule(moduleId) {
        currentModule = data.moduller.find(m => m.id === moduleId);
        if (!currentModule) return;

        const list = document.getElementById('topicList');
        list.innerHTML = '';
        currentModule.konular.forEach(topic => {
            const item = document.createElement('div');
            item.className = 'topic-item';
            const soruSayisi = topic.sorular ? topic.sorular.length : 0;
            item.innerHTML = `
                <span class="topic-name">${topic.baslik}</span>
                <span class="topic-count">${soruSayisi} soru</span>
            `;
            item.onclick = () => openTopic(topic.id);
            list.appendChild(item);
        });

        document.getElementById('headerTitle').innerHTML = `${currentModule.ikon} ${currentModule.baslik}`;
        document.getElementById('headerProgress').textContent = `${currentModule.konular.length} konu`;
        document.getElementById('backBtn').classList.add('visible');
        document.getElementById('backBtn').onclick = renderModules;
        showScreen('screenTopics');
    }

    // -----------------------------------------------------------
    //  3. KONU AÇ → SORU EKRANI
    // -----------------------------------------------------------
    function openTopic(topicId) {
        currentTopic = currentModule.konular.find(t => t.id === topicId);
        if (!currentTopic || !currentTopic.sorular || currentTopic.sorular.length === 0) {
            alert('Bu konuda henüz soru yok.');
            return;
        }
        currentQuestionIndex = 0;
        isAnswered = false;
        renderQuestion();

        document.getElementById('headerTitle').innerHTML = `${currentModule.ikon} ${currentTopic.baslik}`;
        document.getElementById('headerProgress').textContent = `${currentTopic.sorular.length} soru`;
        document.getElementById('backBtn').onclick = () => openModule(currentModule.id);
        showScreen('screenQuestions');
    }

    // -----------------------------------------------------------
    //  4. SORU GÖSTER
    // -----------------------------------------------------------
    function renderQuestion() {
        const sorular = currentTopic.sorular;
        if (!sorular || sorular.length === 0) return;
        const q = sorular[currentQuestionIndex];

        document.getElementById('qBadge').textContent = `📘 ${currentTopic.baslik} • ${currentQuestionIndex+1}/${sorular.length}`;
        document.getElementById('qText').textContent = q.soru;

        const container = document.getElementById('optionsContainer');
        container.innerHTML = '';
        const letters = ['A', 'B', 'C', 'D'];

        q.secenekler.forEach((text, i) => {
            const div = document.createElement('div');
            div.className = 'option-item';
            div.dataset.index = i;
            div.innerHTML = `<span class="letter">${letters[i]}</span> ${text}`;
            div.onclick = function() { checkAnswer(this, i, q.dogru); };
            container.appendChild(div);
        });

        // Sonuç alanını gizle
        document.getElementById('resultArea').classList.remove('visible');

        // Butonları güncelle
        document.getElementById('prevQuestion').disabled = (currentQuestionIndex === 0);
        document.getElementById('nextQuestion').disabled = (currentQuestionIndex === sorular.length - 1);

        isAnswered = false;
    }

    // -----------------------------------------------------------
    //  5. CEVAP KONTROL
    // -----------------------------------------------------------
    function checkAnswer(element, selected, correct) {
        if (isAnswered) return;
        isAnswered = true;

        const allOpts = document.querySelectorAll('.option-item');
        const resultArea = document.getElementById('resultArea');
        const resultBadge = document.getElementById('resultBadge');
        const resultExplanation = document.getElementById('resultExplanation');

        allOpts.forEach(opt => opt.classList.add('disabled'));

        if (selected === correct) {
            element.classList.add('correct-selected');
            resultBadge.innerHTML = '✅ Tebrikler! Doğru cevap.';
            resultBadge.className = 'result-badge correct-text';
        } else {
            element.classList.add('wrong-selected');
            allOpts.forEach(opt => {
                if (parseInt(opt.dataset.index) === correct) {
                    opt.classList.add('show-correct');
                }
            });
            resultBadge.innerHTML = `❌ Maalesef yanlış. Doğru cevap <strong>${String.fromCharCode(65 + correct)})</strong> şıkkıdır.`;
            resultBadge.className = 'result-badge wrong-text';
        }

        resultExplanation.innerHTML = currentTopic.sorular[currentQuestionIndex].aciklama;
        resultArea.classList.add('visible');
        resultArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // -----------------------------------------------------------
    //  6. ÖNCEKİ / SONRAKİ SORU
    // -----------------------------------------------------------
    document.getElementById('prevQuestion').addEventListener('click', () => {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            renderQuestion();
        }
    });

    document.getElementById('nextQuestion').addEventListener('click', () => {
        const sorular = currentTopic.sorular;
        if (currentQuestionIndex < sorular.length - 1) {
            currentQuestionIndex++;
            renderQuestion();
        }
    });

    // -----------------------------------------------------------
    //  7. DETAY BUTONU → MODÜLE DÖN
    // -----------------------------------------------------------
    document.getElementById('detailBtn').addEventListener('click', () => {
        if (currentModule) openModule(currentModule.id);
    });

    // -----------------------------------------------------------
    //  8. GERİ BUTONU (Header'daki)
    // -----------------------------------------------------------
    document.getElementById('backBtn').addEventListener('click', () => {
        // Eğer soru ekranındaysak konu listesine dön
        if (document.getElementById('screenQuestions').classList.contains('active')) {
            openModule(currentModule.id);
        } else {
            renderModules();
        }
    });
</script>

</body>
</html>
