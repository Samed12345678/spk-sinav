<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPK Ders Notları - İnteraktif Sınav</title>
    <style>
        /* RESET & GENEL */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #e5e5e5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone {
            max-width: 400px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
            height: 750px;
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            padding: 12px 16px 4px 16px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 600;
            color: #1c1c1e;
            background: #ffffff;
        }

        .header {
            padding: 8px 16px 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #efefef;
            background: #ffffff;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .avatar {
            width: 36px;
            height: 36px;
            background: #003399;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 16px;
        }
        .header-title {
            font-weight: 700;
            font-size: 16px;
        }
        .header-title span {
            font-weight: 400;
            color: #8e8e93;
            font-size: 13px;
        }
        .header-right {
            color: #003399;
            font-weight: 600;
            font-size: 14px;
            background: #f0f4ff;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
        }
        .header-right:hover {
            background: #dce6f5;
        }

        .feed {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #fafafa;
        }
        .post-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px 18px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid #efefef;
        }
        .post-badge {
            display: inline-block;
            background: #003399;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 12px;
            border-radius: 20px;
            letter-spacing: 0.3px;
            margin-bottom: 12px;
        }
        .question-text {
            font-size: 17px;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 16px;
            color: #1c1c1e;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 18px;
        }
        .option-item {
            background: #f8f9fc;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 15px;
            border: 2px solid #e9ecf2;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }
        .option-item:hover {
            background: #f0f4ff;
            border-color: #b3c6e7;
        }
        .option-item .letter {
            font-weight: 700;
            color: #003399;
            background: #e6edf9;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            transition: 0.15s;
        }
        .option-item.correct-selected {
            border-color: #00b894;
            background: #e6f9f1;
        }
        .option-item.correct-selected .letter {
            background: #00b894;
            color: white;
        }
        .option-item.wrong-selected {
            border-color: #ff3b30;
            background: #ffe8e7;
        }
        .option-item.wrong-selected .letter {
            background: #ff3b30;
            color: white;
        }
        .option-item.disabled {
            pointer-events: none;
            opacity: 0.8;
        }
        .option-item.show-correct {
            border-color: #00b894;
            background: #e6f9f1;
        }
        .option-item.show-correct .letter {
            background: #00b894;
            color: white;
        }

        .result-area {
            display: none;
            margin: 12px 0 16px 0;
            padding: 16px;
            border-radius: 14px;
            background: #f8f9fc;
            border-left: 5px solid #003399;
            animation: fadeSlide 0.3s ease;
        }
        .result-area.visible {
            display: block;
        }
        .result-area .result-badge {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 4px;
        }
        .result-area .result-badge.correct-text {
            color: #00b894;
        }
        .result-area .result-badge.wrong-text {
            color: #ff3b30;
        }
        .result-area .explanation {
            font-size: 15px;
            line-height: 1.5;
            color: #2c2c2e;
            margin-top: 6px;
        }
        .result-area .explanation strong {
            color: #003399;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-detail {
            width: 100%;
            background: #003399;
            color: white;
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 4px;
        }
        .btn-detail:hover {
            background: #002277;
            transform: scale(0.98);
        }
        .btn-detail:active {
            transform: scale(0.95);
        }

        .interaction-bar {
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 14px 16px;
            border-top: 1px solid #efefef;
            background: #ffffff;
        }
        .interaction-bar span {
            color: #262626;
            font-weight: 500;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .interaction-bar .icon {
            font-size: 22px;
        }

        /* MODAL / CAROUSEL */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 999;
            animation: fadeIn 0.25s ease;
        }
        .overlay.active {
            display: flex;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .carousel-container {
            max-width: 400px;
            width: 95%;
            background: #ffffff;
            border-radius: 28px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        }

        .carousel-slides {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            background: #ffffff;
        }
        .carousel-slides::-webkit-scrollbar {
            display: none;
        }

        .slide {
            min-width: 100%;
            scroll-snap-align: start;
            padding: 28px 24px 36px 24px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .slide-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f0f4ff;
            padding-bottom: 10px;
        }
        .slide-header .step {
            font-size: 13px;
            font-weight: 600;
            color: #003399;
            background: #e6edf9;
            padding: 2px 14px;
            border-radius: 30px;
        }
        .slide-header .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #8e8e93;
        }

        .slide-title {
            font-size: 20px;
            font-weight: 700;
            color: #1c1c1e;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .slide-title .emoji-big {
            font-size: 32px;
        }

        .slide-content {
            font-size: 16px;
            line-height: 1.6;
            color: #2c2c2e;
            flex: 1;
        }
        .slide-content ul {
            padding-left: 20px;
            margin-top: 6px;
        }
        .slide-content ul li {
            margin-bottom: 6px;
        }
        .highlight-box {
            background: #f8f9fc;
            border-left: 4px solid #003399;
            padding: 14px 16px;
            border-radius: 8px;
            margin: 8px 0;
            font-weight: 500;
        }
        .highlight-box.green {
            border-left-color: #00b894;
        }
        .highlight-box.orange {
            border-left-color: #ff6b00;
        }

        .slide-footer {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #efefef;
            padding-top: 14px;
        }
        .dots {
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #d1d1d6;
            transition: 0.2s;
        }
        .dot.active {
            background: #003399;
            width: 24px;
            border-radius: 4px;
        }
        .nav-arrows {
            display: flex;
            gap: 12px;
        }
        .nav-arrows button {
            background: #f0f4ff;
            border: none;
            border-radius: 30px;
            padding: 6px 18px;
            font-weight: 700;
            font-size: 15px;
            color: #003399;
            cursor: pointer;
        }
        .nav-arrows button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        @media (max-width: 420px) {
            .phone {
                border-radius: 0;
                height: 100vh;
            }
        }
    </style>
</head>
<body>

<div class="phone">

    <!-- STATUS BAR -->
    <div class="status-bar">
        <span>9:41</span>
        <span>📶  🔋</span>
    </div>

    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <div class="avatar">SP</div>
            <div class="header-title">
                SPK Ders Notları <span id="dersAdi">• Yükleniyor...</span>
            </div>
        </div>
        <div class="header-right" id="soruSayaci" onclick="rastgeleSoru()">Soru 0/0</div>
    </div>

    <!-- FEED (ANA GÖNDERİ) -->
    <div class="feed">
        <div class="post-card">

            <div class="post-badge" id="postBadge">📘 Yükleniyor...</div>

            <div class="question-text" id="soruMetni">
                Sorular yükleniyor, lütfen bekleyin...
            </div>

            <!-- ŞIKLAR -->
            <div class="options" id="optionsContainer">
                <div class="option-item" onclick="alert('Önce sorular yüklensin!')">
                    <span class="letter">A</span> Yükleniyor...
                </div>
                <div class="option-item" onclick="alert('Önce sorular yüklensin!')">
                    <span class="letter">B</span> Yükleniyor...
                </div>
                <div class="option-item" onclick="alert('Önce sorular yüklensin!')">
                    <span class="letter">C</span> Yükleniyor...
                </div>
                <div class="option-item" onclick="alert('Önce sorular yüklensin!')">
                    <span class="letter">D</span> Yükleniyor...
                </div>
            </div>

            <!-- SONUÇ ALANI -->
            <div class="result-area" id="resultArea">
                <div class="result-badge" id="resultBadge"></div>
                <div class="explanation" id="resultExplanation"></div>
            </div>

            <!-- Detay Butonu -->
            <button class="btn-detail" id="openCarouselBtn">
                📖 Detaylı Konu Anlatımı (Kaydırmalı)
            </button>

            <!-- Navigasyon Butonları (İleri/Geri) -->
            <div style="display: flex; gap: 10px; margin-top: 12px;">
                <button onclick="oncekiSoru()" style="flex:1; background:#e9ecf2; border:none; border-radius:12px; padding:12px; font-weight:600; cursor:pointer;">⬅️ Önceki</button>
                <button onclick="sonrakiSoru()" style="flex:1; background:#003399; color:white; border:none; border-radius:12px; padding:12px; font-weight:600; cursor:pointer;">Sonraki ➡️</button>
            </div>

        </div>
    </div>

    <!-- ALT ETKİLEŞİM -->
    <div class="interaction-bar">
        <span><span class="icon">❤️</span> <span id="begeniSayisi">0</span></span>
        <span><span class="icon">💬</span> <span id="yorumSayisi">0</span></span>
        <span><span class="icon">📌</span> Kaydet</span>
        <span><span class="icon">↗️</span> Paylaş</span>
    </div>
</div>

<!-- ========================================= -->
<!--  CAROUSEL / KONU ANLATIMI MODAL           -->
<!-- ========================================= -->
<div class="overlay" id="carouselOverlay">
    <div class="carousel-container">

        <div class="carousel-slides" id="carouselSlides">
            <!-- Slaytlar JavaScript ile doldurulacak -->
        </div>

    </div>
</div>

<script>
    // ============================================================
    //  1. VERİYİ JSON DOSYASINDAN YÜKLE
    // ============================================================
    let questionsData = [];
    let currentQuestionIndex = 0;
    let totalQuestions = 0;
    let isAnswered = false;

    // Sayfa açılır açılmaz data.json'u oku
    fetch('data.json')
        .then(response => {
            if (!response.ok) {
                throw new Error('data.json dosyası bulunamadı!');
            }
            return response.json();
        })
        .then(data => {
            questionsData = data.questions;
            totalQuestions = questionsData.length;
            // Ders adını başlığa yaz
            document.getElementById('dersAdi').innerText = data.dersAdi ? `• ${data.dersAdi}` : '';
            renderQuestion(0);
        })
        .catch(error => {
            console.error('Veri yüklenemedi:', error);
            document.getElementById('soruMetni').innerHTML = `
                <div style="color:#ff3b30; padding:20px; text-align:center;">
                    ❌ <strong>Veri dosyası (data.json) yüklenemedi!</strong><br><br>
                    <span style="font-size:14px; color:#666;">Lütfen dosyanın varlığını ve doğru formatta olduğunu kontrol edin.<br>
                    Hata: ${error.message}</span>
                </div>
            `;
            document.getElementById('postBadge').innerText = '⚠️ Hata';
        });

    // ============================================================
    //  2. SORUYU EKRANA BAS
    // ============================================================
    function renderQuestion(index) {
        if (!questionsData.length) return;
        
        const q = questionsData[index];
        currentQuestionIndex = index;
        isAnswered = false;

        document.getElementById('postBadge').innerHTML = q.badge || '📘 Genel';
        document.getElementById('soruMetni').innerHTML = q.question;

        // Şıkları oluştur
        const optionsContainer = document.getElementById('optionsContainer');
        optionsContainer.innerHTML = '';
        const letters = ['A', 'B', 'C', 'D', 'E', 'F'];

        q.options.forEach((optText, i) => {
            const div = document.createElement('div');
            div.className = 'option-item';
            div.dataset.letter = letters[i];
            div.dataset.correct = q.correctIndex;
            div.dataset.selected = i;
            div.innerHTML = `<span class="letter">${letters[i]}</span> ${optText}`;
            div.onclick = function() { checkAnswer(this, i, q.correctIndex); };
            optionsContainer.appendChild(div);
        });

        // Sonuç alanını gizle
        document.getElementById('resultArea').classList.remove('visible');
        
        // Sayacı güncelle
        document.getElementById('soruSayaci').innerHTML = `Soru ${index+1}/${totalQuestions}`;

        // Beğeni ve yorum sayılarını güncelle (opsiyonel)
        document.getElementById('begeniSayisi').innerText = q.likes || Math.floor(Math.random() * 1000) + 100;
        document.getElementById('yorumSayisi').innerText = q.comments || Math.floor(Math.random() * 50) + 5;
    }

    // ============================================================
    //  3. CEVAP KONTROL
    // ============================================================
    function checkAnswer(element, selected, correct) {
        if (isAnswered) return;
        isAnswered = true;

        const allOptions = document.querySelectorAll('.option-item');
        const resultArea = document.getElementById('resultArea');
        const resultBadge = document.getElementById('resultBadge');
        const resultExplanation = document.getElementById('resultExplanation');
        const currentQ = questionsData[currentQuestionIndex];

        allOptions.forEach(opt => opt.classList.add('disabled'));

        if (selected === correct) {
            element.classList.add('correct-selected');
            resultBadge.innerHTML = '✅ Tebrikler! Doğru cevap.';
            resultBadge.className = 'result-badge correct-text';
        } else {
            element.classList.add('wrong-selected');
            allOptions.forEach(opt => {
                if (parseInt(opt.dataset.selected) === correct) {
                    opt.classList.add('show-correct');
                }
            });
            const correctLetter = String.fromCharCode(65 + correct);
            resultBadge.innerHTML = `❌ Maalesef yanlış. Doğru cevap <strong>${correctLetter})</strong> şıkkıdır.`;
            resultBadge.className = 'result-badge wrong-text';
        }

        // Açıklamayı göster
        resultExplanation.innerHTML = currentQ.explanation || 'Açıklama bulunamadı.';
        resultArea.classList.add('visible');
        resultArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // ============================================================
    //  4. İLERİ / GERİ / RASTGELE
    // ============================================================
    function sonrakiSoru() {
        if (currentQuestionIndex < totalQuestions - 1) {
            renderQuestion(currentQuestionIndex + 1);
        } else {
            alert('🎉 Tüm soruları tamamladınız! Baştan başlamak için "Rastgele"ye tıklayın.');
        }
    }

    function oncekiSoru() {
        if (currentQuestionIndex > 0) {
            renderQuestion(currentQuestionIndex - 1);
        } else {
            alert('Bu ilk soru, geri gidilecek soru yok.');
        }
    }

    function rastgeleSoru() {
        if (totalQuestions === 0) return;
        const randomIndex = Math.floor(Math.random() * totalQuestions);
        renderQuestion(randomIndex);
    }

    // ============================================================
    //  5. CAROUSEL (KONU ANLATIMI) - JSON'dan oku
    // ============================================================
    const overlay = document.getElementById('carouselOverlay');
    const openBtn = document.getElementById('openCarouselBtn');
    const slidesContainer = document.getElementById('carouselSlides');

    // Modal'ı aç
    openBtn.addEventListener('click', () => {
        if (!questionsData.length) return;
        const currentQ = questionsData[currentQuestionIndex];
        if (!currentQ.slides || currentQ.slides.length === 0) {
            alert('Bu soru için henüz konu anlatımı eklenmemiş.');
            return;
        }
        buildCarousel(currentQ.slides);
        overlay.classList.add('active');
    });

    // Modal'ı kapat (her yerdeki close butonları ve overlay'e tıklama)
    document.addEventListener('click', function(e) {
        if (e.target.classList.contains('close-btn') || e.target === overlay) {
            overlay.classList.remove('active');
        }
    });

    function buildCarousel(slidesData) {
        slidesContainer.innerHTML = '';
        const totalSlides = slidesData.length;

        slidesData.forEach((slide, idx) => {
            const slideDiv = document.createElement('div');
            slideDiv.className = 'slide';

            // Header
            const header = document.createElement('div');
            header.className = 'slide-header';
            header.innerHTML = `
                <span class="step">${idx+1} / ${totalSlides}</span>
                <button class="close-btn">✕</button>
            `;
            slideDiv.appendChild(header);

            // Title
            const title = document.createElement('div');
            title.className = 'slide-title';
            title.innerHTML = `<span class="emoji-big">📌</span> ${slide.title}`;
            slideDiv.appendChild(title);

            // Content
            const content = document.createElement('div');
            content.className = 'slide-content';
            content.innerHTML = slide.content;
            slideDiv.appendChild(content);

            // Footer (dots + nav)
            const footer = document.createElement('div');
            footer.className = 'slide-footer';

            const dotsDiv = document.createElement('div');
            dotsDiv.className = 'dots';
            for (let i = 0; i < totalSlides; i++) {
                const dot = document.createElement('span');
                dot.className = 'dot' + (i === idx ? ' active' : '');
                dotsDiv.appendChild(dot);
            }
            footer.appendChild(dotsDiv);

            const navDiv = document.createElement('div');
            navDiv.className = 'nav-arrows';
            const prevBtn = document.createElement('button');
            prevBtn.innerHTML = '‹';
            prevBtn.disabled = idx === 0;
            prevBtn.onclick = (e) => {
                e.stopPropagation();
                const newIdx = idx - 1;
                if (newIdx >= 0) {
                    slidesContainer.scrollTo({ left: newIdx * slidesContainer.clientWidth, behavior: 'smooth' });
                }
            };
            const nextBtn = document.createElement('button');
            nextBtn.innerHTML = '›';
            nextBtn.disabled = idx === totalSlides - 1;
            nextBtn.onclick = (e) => {
                e.stopPropagation();
                const newIdx = idx + 1;
                if (newIdx < totalSlides) {
                    slidesContainer.scrollTo({ left: newIdx * slidesContainer.clientWidth, behavior: 'smooth' });
                }
            };
            navDiv.appendChild(prevBtn);
            navDiv.appendChild(nextBtn);
            footer.appendChild(navDiv);

            slideDiv.appendChild(footer);
            slidesContainer.appendChild(slideDiv);
        });

        // Kaydırma ile dot'ları güncelle
        slidesContainer.addEventListener('scroll', function() {
            const slideWidth = this.clientWidth;
            const newIndex = Math.round(this.scrollLeft / slideWidth);
            const allDots = this.querySelectorAll('.dot');
            allDots.forEach((d, i) => {
                d.classList.toggle('active', i === newIndex);
            });
            // Butonları güncelle
            const prevBtns = this.querySelectorAll('.nav-arrows button:first-child');
            const nextBtns = this.querySelectorAll('.nav-arrows button:last-child');
            prevBtns.forEach((btn, i) => btn.disabled = (i === newIndex));
            nextBtns.forEach((btn, i) => btn.disabled = (i === newIndex));
        });
    }

    // ============================================================
    //  6. KLAVYE DESTEĞİ (Ok tuşları)
    // ============================================================
    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight') sonrakiSoru();
        if (e.key === 'ArrowLeft') oncekiSoru();
        if (e.key === 'r' || e.key === 'R') rastgeleSoru();
    });

    // Konsoldan erişim için
    console.log('🎯 SPK Ders Notları yüklendi!');
    console.log('📚 Toplam soru:', totalQuestions);
    console.log('⌨️  Kısayollar: → (ileri), ← (geri), R (rastgele)');
</script>

</body>
</html>
